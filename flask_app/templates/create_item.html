<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Item!</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
</head>
<body>
    <div class="bgImage image4">
        <div class="container">
            <form action="/item/create" method="POST">
                <fieldset class="form">
                    <legend class="legend_bg">New Item!</legend>
                    {% with messages = get_flashed_messages() %}
                        {% if messages %}
                            <div class="error">
                                {% for message in messages %}
                                    <p>{{message}}</p>
                                {% endfor %}
                            </div>
                        {% endif %}
                    {% endwith %}
                    <div class="entries">
                        <div class="row">
                            <div class="col">
                                <label for="name">Name:</label>
                                <input type="text" name="name" id="item_name_input">
                            </div>
                            <div class="col">
                                <label for="quantity">Qty:</label>
                                <input type="number" name="quantity" value=0 id="item_quantity_input">
                            </div>
                        </div>
                        <div class="row col">
                            <label for="notes">Notes:</label>
                            <textarea name="notes" cols="56" rows="10"></textarea>
                        </div>
                        <div class="row col">
                            <label for="order_link">Order Link:</label>
                            <input type="text" name="order_link" id="item_link_input">
                        </div>
                    </div>
                    <div class="form_button">
                        <button id="add_button">Add Item</button>
                    </div>
                </fieldset>
                <div class="footer">
                    <a href="/{{this_collectionID}}/category/{{this_categoryID}}">Go Back</a>
                </div>
                <input type="hidden" name="collection_id" value="{{this_collectionID}}">
                <input type="hidden" name="category_id" value="{{this_categoryID}}">
            </form>
        </div>
    </div>
</body>
</html>
