<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/styles.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js" integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2" crossorigin="anonymous"></script>
</head>
<body>
    <div class="banner">
        <img src="{{url_for('static', filename='images/ItemInventory.jpg')}}" alt="ItemInventory Logo" class="icon">
        <div class="searchBar">
            <input type="search" name="searchBar" placeholder="Search Items..." id="collectionSearchBar">
        </div>
        <div class="navButons">
            <a href="/{{this_collectionID}}/category/edit/{{this_category.id}}">Edit</a>
            <a href="">Logs</a>
            <a href="/{{this_collectionID}}/category/delete/{{this_category.id}}" class="delete_item">Delete Category</a>
            <a href="/collection/{{this_collectionID}}">Collection</a>
        </div>
    </div>
    <div class="bgImage image4">
        <div class="header">
            <h1>{{this_category.title}}</h1>
        </div>
        <div class="sub_header">
            <p>{{this_category.description}}</p>
        </div>
        <div class="item_display">
            <table class="table table-hover">
                <thead class="thead-dark">
                    <tr>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% if all_items %}
                        {% for item in all_items %}
                            <tr>
                                <td>{{item.name}}</td>
                                <td>{{item.quantity}}</td>
                                <td class="item_actions">
                                    <a href="">Remove One</a>
                                    <a href="">Remove Multiple</a>
                                    <a href="/{{this_collectionID}}/{{this_category.id}}/item/{{item.id}}">Details</a>
                                    <a href="/{{this_collectionID}}/{{this_category.id}}/item/edit/{{item.id}}">Edit</a>
                                    <!-- <div> -->
                                        <a href="/{{this_collectionID}}/{{this_category.id}}/item/delete/{{item.id}}" class="delete_item">Delete</a>
                                    <!-- </div> -->
                                </td>
                            </tr>
                        {% endfor %}
                    {% endif %}
                </tbody>
            </table>
            <div class="footer">
                <a href="/{{this_collectionID}}/{{this_category.id}}/item/new">Add Item</a>
            </div>
        </div>
    </div>
</body>
</html>
